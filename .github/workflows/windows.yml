name: Windows
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Least privilege: nothing here writes to the repo, and checkout persists the
# token into .git/config. Declaring any block sets unlisted scopes to `none`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  # Supersede stale runs on PRs and feature branches, but never cancel master:
  # github.run_id is unique per run, so every default-branch commit gets its own
  # group and completes independently.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: windows-latest
    name: (${{ matrix.target }}, ${{ matrix.cfg_release_channel }})
    env:
      CFG_RELEASE_CHANNEL: ${{ matrix.cfg_release_channel }}
    strategy:
      fail-fast: false
      matrix:
        target: [
          x86_64-pc-windows-msvc,
        ]
        cfg_release_channel: [stable]

    steps:
      # The Windows runners have autocrlf enabled by default
      # which causes failures for some of rustfmt's line-ending sensitive tests
      - name: disable git eol translation
        run: git config --global core.autocrlf false
      - name: checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fire_seq_search_server

      - name: build
        run: |
          rustc -Vv
          cargo -V
          cd fire_seq_search_server
          cargo build --locked
        shell: cmd

      - name: test
        run: |
          cd fire_seq_search_server
          cargo test --locked
        shell: cmd
      - name: Package
        run: |
          cd fire_seq_search_server
          cargo package --locked --verbose
        shell: cmd
