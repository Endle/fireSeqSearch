name: Linux and macOS

# Template Reference: https://www.infinyon.com/blog/2021/04/github-actions-best-practices/
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Least privilege: nothing here writes to the repo, and checkout persists the
# token into .git/config. Declaring any block sets unlisted scopes to `none`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  # Supersede stale runs on PRs and feature branches, but never cancel master:
  # github.run_id is unique per run, so every default-branch commit gets its own
  # group and completes independently.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Cargo test  (${{ matrix.rust }}) (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fire_seq_search_server
# Real tests starts here
      - name: Check version
        run: rustup --version && rustc --version && cargo --version
      - name: Install rustfmt
        run: |
          rustup component add rustfmt
          which rustfmt && rustfmt --version
      - name: Build
        run: |
          cd fire_seq_search_server
          cargo build --locked --verbose
      - name: Run tests
        run: |
          cd fire_seq_search_server
          cargo test --locked --verbose
      - name: Install
        run: |
          cd fire_seq_search_server
          cargo install --locked --path .
      - name: Package
        run: |
          cd fire_seq_search_server
          cargo package --locked --verbose


  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fire_seq_search_server
      - name: Build
        run: |
          cd fire_seq_search_server
          cargo build --locked --verbose
      - name: Save Artifact
        run: |
          mkdir builds
          mv fire_seq_search_server/target/debug/fire_seq_search_server builds
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: logseq-${{ runner.os }}-builds
          path: builds
