name: Quality Control
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  # Supersede stale runs on PRs and feature branches, but never cancel master:
  # github.run_id is unique per run, so every default-branch commit gets its own
  # group and completes independently.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # Prebuilt binary from GitHub Releases — no `cargo install` compile, no
    # crates.io traffic. `arguments: ""` overrides the action's `--all-features`
    # default so this stays behaviour-identical to the old bare `cargo deny check`.
    - name: cargo deny (licenses + advisories)
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        manifest-path: fire_seq_search_server/Cargo.toml
        command: check licenses advisories
        arguments: ""
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: fire_seq_search_server
    - name: clippy
      run: |
          cd fire_seq_search_server
          cargo clippy --locked
