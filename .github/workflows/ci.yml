name: Build and Test

# Build + test the server on every supported platform. Windows is a matrix row,
# not its own workflow: the job is identical (build, test, package), and the only
# platform-specific bit is the autocrlf guard below.
#
# `cargo test` (not `--all-targets`) is deliberate — there are no bench targets,
# and --all-targets would silently drop the doctests in post_query/ and
# language_tools/.

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Least privilege: nothing here writes to the repo, and checkout persists the
# token into .git/config. Declaring any block sets unlisted scopes to `none`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  # Supersede stale runs on PRs and feature branches, but never cancel master:
  # github.run_id is unique per run, so every default-branch commit gets its own
  # group and completes independently.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    # Job-level, so every step runs in the crate root without a shell-specific
    # `cd` — which is what let the Windows job drop `shell: cmd`.
    defaults:
      run:
        working-directory: fire_seq_search_server
    steps:
      # The Windows runners enable autocrlf by default; the test fixtures under
      # tests/resource are read verbatim, so let git leave line endings alone.
      # Runs before checkout, hence the working-directory override.
      - name: Disable git eol translation
        if: runner.os == 'Windows'
        working-directory: .
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fire_seq_search_server

      - name: Test
        run: cargo test --locked --verbose

      # Verifies the crate tarball still builds. Platform-independent, so once is
      # enough — no need to repeat it on macOS and Windows.
      - name: Package
        if: runner.os == 'Linux'
        run: cargo package --locked --verbose
