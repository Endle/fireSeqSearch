name: Llamafile Embed (zero-config)

# Exercises the zero-config embedding path end-to-end: auto-download the pinned
# bge-m3 llamafile, spawn it, and confirm it serves 1024-dim embeddings over
# /v1/embeddings. This is the only workflow that proves the *published* artifact
# boots and embeds on a clean machine — a bad pin, a rejected llama.cpp arg, or a
# dim change fails here even though every unit test passes.
#
# The test (tests/llamafile_embed_live.rs) self-skips unless FIRE_SEQ_LIVE_LLAMAFILE
# is set, so the plain Rust CI never pulls the 723 MB file; only this job does.

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Least privilege: nothing here writes to the repo, and checkout persists the
# token into .git/config. Declaring any block sets unlisted scopes to `none`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  # Supersede stale runs on PRs and feature branches, but never cancel master:
  # github.run_id is unique per run, so every default-branch commit gets its own
  # group and completes independently.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  llamafile-embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fire_seq_search_server

      # Cache the ~723 MB llamafile itself, keyed on the pin file. When the pin
      # bumps (URL/SHA-256 in model_fetch.rs change), the key changes and the new
      # artifact is re-fetched; otherwise it's restored and ensure_bge_m3()'s
      # SHA-256 check short-circuits the download.
      - name: Cache bge-m3 llamafile
        uses: actions/cache@v4
        with:
          path: ~/.cache/fire_seq_search
          key: bge-m3-llamafile-${{ hashFiles('fire_seq_search_server/src/llm_backend/model_fetch.rs') }}

      - name: Run llamafile embed integration test
        env:
          FIRE_SEQ_LIVE_LLAMAFILE: "1"
        run: |
          cd fire_seq_search_server
          # --nocapture surfaces the "fetching …" / boot logs; single test, so the
          # long CPU embed doesn't race anything.
          cargo test --locked --test llamafile_embed_live -- --nocapture
