name: Quality Control
on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # Prebuilt binary from GitHub Releases — no `cargo install` compile, no
    # crates.io traffic. `arguments: ""` overrides the action's `--all-features`
    # default so this stays behaviour-identical to the old bare `cargo deny check`.
    - name: cargo deny (licenses + advisories)
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        manifest-path: fire_seq_search_server/Cargo.toml
        command: check licenses advisories
        arguments: ""
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: fire_seq_search_server
    - name: clippy
      run: |
          cd fire_seq_search_server
          cargo clippy --locked
